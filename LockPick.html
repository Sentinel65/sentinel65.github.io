<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lock Pick</title>

<style>

:root{
    --bg:#111;
    --panel:#1d1d1d;
    --border:#444;
    --text:#f0f0f0;
    --accent:#e0a800;
    --good:#4caf50;
    --bad:#f44336;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    padding:10px;
}

button{
    cursor:pointer;
}

.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.row{
    display:flex;
    gap:8px;
}

.column{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.center{
    text-align:center;
}

#topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#pins{
    display:flex;
    justify-content: center;
    gap:4px;
    flex-wrap: nowrap;
}

.pin-card{
    border:1px solid #555;
    border-radius:10px;
    padding:8px;
    text-align:center;
    min-height:90px;
    background:#222;
    flex:1;
    min-width:0;
}

.pin-card.set{
    background:#1d4020;
}

.pin-card.current{
    outline:2px solid gold;
}

#timeTrack{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:3px;
}

.time-cell{
    height:24px;
    border-radius:4px;
    border:1px solid #555;
    background:#222;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.time-cell.used{
    background:#666;
}

#gauge{
    display:flex;
    justify-content:center;
    gap:5px;
}

.gauge-cell{
    width:45px;
    height:45px;
    border:1px solid #555;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.gauge-active{
    background:gold;
    color:black;
    font-weight:bold;
}

#diceArea{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.die{
    height:60px;
    border-radius:10px;
    border:2px solid #666;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    background:#222;
}

#controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn-group-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

.btn-group-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.control-btn{
    height:45px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
}

.control-btn:hover{
    background:#555;
}

#log{
    height:220px;
    overflow-y:auto;
    font-size:13px;
    white-space:pre-line;
}

@media (max-width:600px){

    .die{
        height:55px;
    }
    
    /* Zmenšení písma u tří tlačítek vedle sebe pro mobily */
    .btn-group-3 .control-btn {
        font-size: 12px;
        padding: 0 2px;
    }
}


.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    z-index:999;
}

.modal-content{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(95vw,700px);
    max-height:90vh;
    overflow-y:auto;
    background:#222;
    border-radius:12px;
    border:1px solid #555;
}

.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-bottom:1px solid #444;
}

.help-body{
    padding:15px;
    line-height:1.5;
}

.help-body h3{
    margin-top:16px;
    margin-bottom:8px;
    color:gold;
}

.help-body ul{
    margin-left:20px;
}

.help-body table td{
    border-bottom:1px solid #333;
    vertical-align:top;
}

.help-body table tr:last-child td{
    border-bottom:none;
}

.help-body p{
    margin-bottom:6px;
}

.dir-btn{
    width:34px;
    height:34px;
    padding:0;
    font-size:16px;
    line-height:34px;
    text-align:center;
    cursor:pointer;
    background:#333;
    border:1px solid #555;
    color:#e8e0d0;
    border-radius:4px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin:1px;
}
.dir-btn:hover:not(:disabled){ background:#444; border-color:#c8a84b; }
.dir-btn:disabled{ opacity:.35; cursor:not-allowed; }

#gridArea{
    margin-top:15px;
    padding-bottom: 15px;
}

.setting-grid{
    border-collapse:collapse;
    margin:auto;
}

.setting-grid td,
.setting-grid th{
    width:36px;
    height:36px;
    text-align:center;
    vertical-align:middle;
    font-weight:bold;
}

.setting-grid th{
    color:#e0a800;
    padding:2px;
}

.setting-grid th svg{
    display:block;
    margin:auto;
    color:#e0a800;
}

.setting-grid td{
    background:#222;
    color:#fff;
}

.grid-a{
    background:#2e7d32 !important;
}

.grid-b{
    background:#1565c0 !important;
}

.grid-ab{
    background:#9c27b0 !important;
}

#calcArea{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    line-height:1.8;
}

.icon-btn{

    width:36px;
    height:36px;

    border:none;

    border-radius:8px;

    background:#333;

    color:white;

    font-size:18px;
}

.icon-btn:hover{

    background:#555;
}

.assign-btn{

    min-height:44px;

    padding:8px 10px;

    margin:2px;

    border:none;

    border-radius:8px;

    font-size:14px;

    cursor:pointer;
}

@media (max-width: 600px){

    .assign-btn{

        min-height:32px;

        min-width:56px;

        font-size:16px;
    }
}

#toast{

    position:fixed;

    left:50%;
    top:20px;

    transform:translateX(-50%);

    background:#222;

    color:white;

    padding:12px 18px;

    border-radius:12px;

    border:2px solid #666;

    font-weight:bold;

    text-align:center;

    z-index:9999;

    opacity:0;

    pointer-events:none;

    transition:all .25s;
    width:90%;
    max-width:500px;

    box-shadow:0 4px 12px rgba(0,0,0,.4);
}

#toast.show{

    opacity:1;

    top:60px;
}

.toast-success{
    border-color:#4caf50;
}

.toast-warning{
    border-color:#ff9800;
}

.toast-error{
    border-color:#f44336;
}

.toast-info{
    border-color:#2196f3;
}


.control-btn:disabled{

    opacity:0.5;

    cursor:not-allowed;

    filter:grayscale(100%);
}

.btn-next{
    background:#2e7d32 !important;

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}


.time-cell.tension{
    background:#ad1457;
}

.time-cell.tension.used{
    background:#f06292;
}

.tension-track-cell{

    width:28px;
    height:28px;

    border:1px solid #555;

    display:flex;

    align-items:center;
    justify-content:center;

    background:#222;

    border-radius:4px;

    font-size:12px;
}

.tension-track-cell.used{

    background:#ad1457;

    color:white;

    font-weight:bold;
}

#tensionTracks{
    overflow-x:auto;
}

@keyframes diceRoll{

    0%{
        transform:rotateY(0deg);
    }

    50%{
        transform:rotateY(180deg);
    }

    100%{
        transform:rotateY(360deg);
    }
}

.die.rolling{

    animation:diceRoll .5s;
}

.die.held{
    border:3px solid gold;
    box-shadow:0 0 12px gold;
}


.grid-blocked{
    background:#444 !important;
    color:#999;
}

.grid-error {
    background-color: var(--bad) !important;
    color: white !important;
    border: 2px dashed white !important;
    font-weight: bold;
}

#bindingTrackDisplay {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 3px;
    align-items: center;
}

.bt-cell {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid #444;
    border-radius: 3px;
    background: #222;
    color: #aaa;
    position: relative;
}

.bt-cell.bt-current {
    border: 2px solid #e0a800;
    background: #3a2e00;
    color: #e0a800;
    box-shadow: 0 0 6px rgba(224,168,0,0.5);
}

.bt-cell.bt-passed {
    background: #1a1a1a;
    color: #555;
    border-color: #333;
}

.bt-cell.bt-check { color: #4caf50; }
.bt-cell.bt-time  { color: #e05a2b; }
.bt-cell.bt-dash  { color: #888; }
.bt-cell.bt-current.bt-check { color: #4caf50; border-color: #4caf50; background: #0d2e0d; }
.bt-cell.bt-current.bt-time  { color: #e05a2b; border-color: #e05a2b; background: #2e0d00; }
.bt-cell.bt-current.bt-dash  { color: #e0a800; border-color: #e0a800; background: #3a2e00; }

.bt-num {
    font-size: 7px;
    color: #555;
    position: absolute;
    top: 1px;
    left: 2px;
}
    background-color: var(--bad) !important;
    color: white !important;
    border: 2px dashed white !important;
    font-weight: bold;
}

.lang-btn {
    cursor: pointer;
    background: #333;
    border: 1px solid #666;
    color: #f0f0f0;
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: background .15s, border-color .15s;
}
.lang-btn:hover { background: #444; border-color: var(--accent); }
</style>
</head>

<body>

<h1>🔒 LOCK PICK</h1>

<div id="topbar" class="panel">
    <div style="display: flex; gap: 15px;">
        <div>🕐 <span id="timeText">0</span></div>
        <div>🪛 <span id="pickText">0</span></div>
        <div>🎯 <span id="scoreText">0</span></div>
    </div>
    
    <div style="display: flex; gap: 8px; align-items: center;">
        <button class="icon-btn" id="langBtn" onclick="toggleLang()" title="Switch language">🇨🇿</button>
        <button class="icon-btn" onclick="deleteSave()" title="Smazat save">🗑️</button>
        <button class="icon-btn" onclick="saveGame()" title="Uložit">💾</button>
        <button class="icon-btn" onclick="loadGame()" title="Načíst">📂</button>
        <button class="icon-btn" onclick="showHelp()" title="Nápověda">💡</button>
    </div>
</div>

<div class="panel">
    <h3 data-i18n="pins">PIN</h3>
    <div id="pins"></div>
</div>

<div class="panel">
    <h3 data-i18n="time">Časomíra</h3>
    <div id="timeTrack"></div>
</div>

<div class="panel" id="bindingTrackPanel">
    <h3 data-i18n="bindingTrackTitle">Binding Track</h3>
    <div id="bindingTrackDisplay"></div>
</div>

<div class="panel">
    <h3 data-i18n="tensionGauge">Tension Gauge</h3>
    <div id="gauge"></div>
</div>

<div class="panel">
    <h3 data-i18n="tensionTracks">Tension Tracks</h3>
    <div id="tensionTracks"></div>
</div>

<div class="panel">
    <h3 data-i18n="dice">Kostky</h3>
    <div id="diceArea"></div>
</div>

<div class="panel">
    <div id="controls">

        <div class="btn-group-3">
            <button class="control-btn" onclick="confirmNewGame(4)" data-i18n="game4">Hra 4 piny</button>
            <button class="control-btn" onclick="confirmNewGame(5)" data-i18n="game5">Hra 5 pinů</button>
            <button class="control-btn" onclick="confirmNewGame(6)" data-i18n="game6">Hra 6 pinů</button>
        </div>

        <div class="btn-group-3">
        <button id="btnTensionRoll" class="control-btn" onclick="rollDice()">
            Tension Roll
        </button>
            <button id="btnSetPin" class="control-btn" onclick="startSettingPin()" data-i18n="setPin">Set PIN</button>
        <button id="btnEvaluate" class="control-btn" style="width: 100%;" onclick="evaluateSetting()" data-i18n="evaluate">
            Vyhodnotit
        </button>
        </div>
        
        <div class="btn-group-3">
			<button id="btnFinishTension" class="control-btn" onclick="finishTension()" data-i18n="confirmTension">Potvrdit napětí</button>
            <button id="btnCheckBinding" class="control-btn" onclick="startBindingCheck()" data-i18n="checkBinding">Check Binding</button> 
            <button id="btnBindingRoll" class="control-btn" onclick="bindingRoll()" data-i18n="bindingRoll">Binding Roll</button>
       

        </div>



        <div class="btn-group-3">
            <button class="control-btn pick-btn" onclick="setPick(-1)">Pick -1</button>
            <button class="control-btn pick-btn" onclick="setPick(0)">Pick 0</button>
            <button class="control-btn pick-btn" onclick="setPick(1)">Pick +1</button>
        </div>

         <div id="powersArea" class="btn-group-3">
            <button id="btnPowerReroll" class="control-btn" onclick="usePowerReroll()" data-i18n="powerReroll">🎲 Přehodit</button>
            <button id="btnPowerModify" class="control-btn" onclick="usePowerModify()" data-i18n="powerModify">➕➖ 1</button>
            <button id="btnPowerPick2" class="control-btn" onclick="usePowerPick2()" data-i18n="powerPick2">↔ Pick 2</button>
         </div>
    </div>
</div>


<div class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;" data-i18n="settingPin">Setting PIN</h3>
        <div id="settingPinHeader" style="font-size: 1.1em; font-weight: bold; color: gold;"></div>
    </div>

    <div id="settingInfo" style="margin-top: 8px;" data-i18n="inactive">
        Neaktivní
    </div>

    <div id="assignmentArea" style="margin-top: 15px;"></div>
	<div id="calcArea"></div>
	<div id="gridArea"></div>
	<div id="intersectionControls"></div>
</div>


<div class="panel">

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:8px;
    ">

        <h3 data-i18n="log">Log</h3>

        <div style="
            display:flex;
            gap:6px;
        ">

            <button
                class="icon-btn"
                onclick="clearLog()">

                🗑️
            </button>

            <button
                class="icon-btn"
                onclick="copyLog()"
                title="Kopírovat log">

                📋
            </button>

        </div>

    </div>

    <div id="log"></div>

</div>


<div id="helpModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="helpModalTitle">🔒 Lock Pick — Nápověda</h2>
            <button onclick="hideHelp()">✖</button>
        </div>
        <div class="help-body" id="helpModalBody"></div>
    </div>
</div>
<script>
const PIN_DECK = [
    2,
    3,
    4,4,
    5,5,
    6,6,6,
    7,7,7,
    8,8,
    9,9,
    10,10
];

const GRID = [
    [1,3,2,6,4,5],
    [4,1,5,2,4,3],
    [4,2,1,3,4,0],
    [5,0,6,1,6,5],
    [3,5,2,4,1,2],
    [2,6,3,3,6,1]
];


const BINDING_TRACK = [
null,
"-",
"-",
"-",
"CHECK",
"-",
"-",
"TIME",
"-",
"CHECK",
"-",
"TIME",
"-",
"-",
"CHECK",
"TIME",
"CHECK",
"-",
"CHECK",
"CHECK",
"TIME",
"CHECK",
"TIME",
"CHECK",
"CHECK"
];


const TENSION_TRACKS = [

{
    min:4,
    max:6,
    spaces:["X","→","X","X","←","X","X","→","X","X"]
},

{
    min:7,
    max:11,
    spaces:["←","X","←","→","X","←","→","X","→","←"]
},

{
    min:12,
    max:17,
    spaces:["→","→","←←","X","→","→→","X","←","←←","→"]
},

{
    min:18,
    max:24,
    spaces:["←←","→→","←","→→","←←","→","←←","←←","→→","→"]
}

];

const state = {

    assignment: {
    aRow:null,
    aCol:null,
    bRow:null,
    bCol:null
    },
    powers:{
    reroll:true,
    modify:true,
    pick2:true
    },
	pick2Active:false,
    blockedCells: [],
    usedDice:[],
    difficulty:5,
    pins:[],
    time:0,
	lastAction:null,
    dice:[1,1,1,1],
	bindingPhaseFinished:false,
    freeMoveRemaining:0,
    pickModifier:0,
	mustCheckTension:false,
    tensionMode:false,
	tensionRollNumber:0,
	tensionLastTotal:0,
    lastTensionDice:[1,1,1,1],
	heldDice:[false,false,false,false],
	tensionUsed:[0,0,0,0],
    tensionPos:2,
    tensionMarks:{},
    tensionRolls:0,
    tensionDice:[1,1,1,1],
    settingDice: [],
    currentSettingPin: null,
	intersectionA: {row:null,col:null},
	intersectionB: {row:null,col:null},
    settingTotal: 0,
    nextBindingOrder: 1,
    score:0,
    gameOver:false,
    bindingTrackPos:0,
    bindingRollCount:0,
    currentCheckPin:null,
    bindingFound:0,
    bindingNextPinId:null,
    bindingDashPending:false,
    log:[]
};

function rand(max){
    return Math.floor(Math.random()*max);
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }

    return array;
}

function addLog(text, doSave = true){

    state.log.unshift(text);

    document.getElementById("log").innerHTML =
        state.log.join("<br>");
        
    // Uloží hru pouze pokud je doSave true
    if (doSave) {
        autoSave();
    }
}


function animateDice(){

    document
        .querySelectorAll(".die")
        .forEach(die=>{

            die.classList.remove(
                "rolling"
            );

            void die.offsetWidth;

            die.classList.add(
                "rolling"
            );
        });
}


function rollDice(){

	

    if(!state.mustCheckTension){

        showToast(
            "⚙ Tension Check není potřeba",
            "warning"
        );

        return;
    }

    state.tensionRolls++;

    let total = 0;

    for(let i=0;i<4;i++){

    if(
			!state.heldDice[i]
		){
			state.dice[i] =
				rand(6)+1;
		}

		total += state.dice[i];
	}
    state.lastTensionDice = [...state.dice];

    renderDice();
	animateDice();
    render();
    addLog(
     `🎲 Tension Roll ${state.tensionRolls}/3 = ${total} 🎲 ${state.dice.join(", ")}`
    );
	state.tensionLastTotal = total;
    if(state.tensionRolls >= 3){
	 finishTension();
		render();
		return;
    }
}


function spendTime(count,mark=""){

    state.time += count;
	addLog(
    t("logTime", state.time)
);
if(
    TENSION_SLOTS.has(state.time)
){  

    if(state.currentSettingPin){
        state.lastAction = "setting";
    }
    else if(state.currentCheckPin !== null){
        state.lastAction = "binding";
    }
    else{
        state.lastAction = null;
    }

    addLog(
        t("logTensionSlot", state.time)
    );

    state.mustCheckTension = true;

    showToast(
        t("toastTensionCheck"),
        "warning"
    );
}

    if(state.time > 30){

        state.gameOver = true;

        addLog(t("logTimeUp"));

        showToast(
            t("logTimeUp"),
            "error"
        );

        addLog(
            t("logGameOver")
        );

        showToast(
            t("toastGameOver", state.time),
            "error"
        );


        render();

        return false;
    }

    render();

    return true;
}


function getNextUncheckedPin(){

    for(let i=0;i<state.pins.length;i++){

        if(!state.pins[i].found){

            return i;
        }
    }

    return -1;
}


// Pomocná funkce: vrátí pin s nejvyšším ID mezi nenalezenými
function getTopmostUnsetPin(){
    const unset = state.pins.filter(p => !p.found);
    if(unset.length === 0) return null;
    return unset.reduce((a, b) => a.id > b.id ? a : b);
}

function getBottommostUnsetPin(){
    const unset = state.pins.filter(p => !p.found);
    if(unset.length === 0) return null;
    return unset.reduce((a, b) => a.id < b.id ? a : b);
}

// Pomocná funkce: vrátí další pin výše (vyšší ID) od aktuálního
function getNextPinUp(currentPin){
    const higher = state.pins
        .filter(p => !p.found && p.id > currentPin.id)
        .sort((a, b) => a.id - b.id);
    // Pokud žádný vyšší neexistuje, vrátí null (= jsme na topmost)
    return higher.length > 0 ? higher[0] : null;
}


function startBindingCheck(){
    if(state.mustCheckTension){
        showToast(t("toastTensionFirst"), "warning");
        return;
    }
    if(state.gameOver) return;

    // Při dashPending: hráč se rozhodl přeskočit na další pin (místo dalšího hodu)
    if(state.bindingDashPending){
        state.bindingDashPending = false;
        bindingMoveToNextPin("DASH_SKIP");
        return;
    }

    // Pokud zbývá jen poslední pin — odhalit automaticky
    if(state.bindingFound >= state.difficulty - 1){
        autoRevealLastPin();
        return;
    }

    // Najdi pin ke kontrole
    let targetPin;
    if(state.bindingNextPinId !== null && state.bindingNextPinId !== undefined){
        targetPin = state.pins.find(p => p.id === state.bindingNextPinId && !p.found);
    }
    // Fallback: nejnižší nenastavený
    if(!targetPin){
        targetPin = getBottommostUnsetPin();
    }
    if(!targetPin) return;

    state.currentCheckPin = state.pins.indexOf(targetPin);
    state.bindingNextPinId = null;
    state.bindingTrackPos = 0;
    state.bindingRollCount = 0;
    state.bindingDashPending = false;

    spendTime(1, "B");
    addLog(t("logCheckPin", targetPin.id));
    render();
}


function bindingMoveToNextPin(reason){
    // reason: "TIME" nebo "DASH_EXHAUSTED" nebo "DASH_SKIP"
    const currentPin = state.pins[state.currentCheckPin];
    if(!currentPin) return;

    const isTopmost = !getNextPinUp(currentPin);
    
    if(isTopmost){
        // Topmost pin rule: R penalizace + přechod na nejnižší
        addLog(t("logTopmostPin", currentPin.id));
		showToast(t("logTopmostPin", currentPin.id), "warning");
        spendTime(1, "R");
        state.bindingNextPinId = getBottommostUnsetPin()?.id ?? null;
    } else {
        // Přejdi na další pin výše
        const nextPin = getNextPinUp(currentPin);
        state.bindingNextPinId = nextPin ? nextPin.id : null;
        if(reason !== "DASH_SKIP") addLog(t("logBindingSkip"));
        else addLog(t("logBindingSkip")); 
    }

    // Vyčisti stav aktuálního testování (Binding track)
    state.bindingRollCount = 0;
    state.bindingDashPending = false;
    state.currentCheckPin = null;

    // ZMĚNA: Přímé nastavení nového cíle při úmyslném přeskoku (DASH_SKIP)
    if (reason === "DASH_SKIP" && state.bindingNextPinId !== null) {
        const targetPin = state.pins.find(p => p.id === state.bindingNextPinId && !p.found);
        if (targetPin) {
            // Ihned zaměří hru na další PIN bez zrušení aktivity
            state.currentCheckPin = state.pins.indexOf(targetPin);
            state.bindingNextPinId = null; 
			state.bindingTrackPos = 0;
            addLog(t("logCheckPin", targetPin.id));
        } else {
            state.currentCheckPin = null;
        }
    } else {
        // Standardní chování po propadnutí časem nebo dojití dechu – vyřadí fokus
        state.currentCheckPin = null;
    }

    render();
}


function evaluateBindingTrackPosition(){

    const result =
        BINDING_TRACK[state.bindingTrackPos];

    // ✓ Úspěch
    if(result === "CHECK"){

        addLog("✅ Binding Track = CHECK");

        bindingSuccess();
        return;
    }

    // ⏱ Penalizace
    if(result === "TIME"){

        addLog(t("logTimePenalty"));

        showToast(
            t("logTimePenalty"),
            "warning"
        );

        spendTime(1,"X");

        bindingMoveToNextPin("TIME");

        return;
    }

    // —
    if(result === "-"){

        if(state.bindingRollCount >= 4){

            addLog(
                t("logRollsExhausted")
            );

            showToast(
                t("toastNoResult"),
                "warning"
            );

            bindingMoveToNextPin(
                "DASH_EXHAUSTED"
            );

            return;
        }

        state.bindingDashPending = true;

        addLog(
            t("logContinueRoll")
        );

        showToast(
            t("logContinueRoll"),
            "info"
        );

        render();

        return;
    }
}


function bindingRoll(){
    if(state.gameOver) return;

    if(state.mustCheckTension){
        showToast(t("toastTensionFirst"), "warning");
        return;
    }

    if(state.currentCheckPin === null || state.currentCheckPin === undefined || state.currentCheckPin < 0){
        showToast(t("toastNoBinding"), "warning");
        return;
    }

    const die = rand(6) + 1;
    state.lastBindingDie = die;
    state.bindingRollCount++;

    renderDice();
    animateDice();

    state.bindingPrevPos = state.bindingTrackPos;
    // Kumulativní posun tokenu po tracku
    state.bindingTrackPos += die;
    
    // Clamp na konec tracku
    if(state.bindingTrackPos >= BINDING_TRACK.length){
        state.bindingTrackPos = BINDING_TRACK.length - 1;
    }

    const result = BINDING_TRACK[state.bindingTrackPos];

    addLog(t("logBindingRoll", state.bindingRollCount, die));
    evaluateBindingTrackPosition();

    render();
    return;
  }




function bindingSuccess() {
    const pin = state.pins[state.currentCheckPin];
    if (!pin) return;

    pin.found = true;
    state.bindingFound++;

    addLog(t("logPinFound", pin.id, pin.bindingOrder));
    let toastText = t("logPinFound", pin.id, pin.bindingOrder);

    // Vyčisti stav testování
    state.currentCheckPin = null;
    // NERESETUJ bindingTrackPos — token zůstane na ✓ dokud hráč neklikne Check Binding
    state.bindingRollCount = 0;
    state.bindingDashPending = false;

    // Pravidla: po úspěchu jdi na nejnižší nenastavenou (bottommost unset)
    const bottommost = getBottommostUnsetPin();
    state.bindingNextPinId = bottommost ? bottommost.id : null;

    // Pokud zbývá jen 1 neodhalený pin — odhal automaticky
    if(state.bindingFound === state.difficulty - 1){
        const lastPin = autoRevealLastPin(true);
        if(lastPin){
            toastText += "\n" + t("logLastPinAuto", lastPin.id, lastPin.bindingOrder);
        }
    }

    showToast(toastText, "success");
    render();
}



function autoRevealLastPin(calledFromSuccess = false) {
    const lastPin = state.pins.find(p => !p.found);
    if (!lastPin) return null;

    lastPin.found = true;
    state.bindingFound++;
    
    const logMsg = t("logLastPinAutoFull", lastPin.id, lastPin.bindingOrder);
    addLog(logMsg);

    // Pokud se funkce volá samostatně (mimo úspěšný hod), ukáže svůj vlastní toast
    if (!calledFromSuccess) {
        showToast(t("logLastPinAuto", lastPin.id, lastPin.bindingOrder), "success");
        render();
    }
    return lastPin;
}



function getNextPinToSet(){

    );
}

function syncDiceAfterPower(diceArray){
    // Binding Roll
    if(
        state.currentCheckPin !== null &&
        state.bindingRollCount > 0 &&
        !state.mustCheckTension &&
        !state.currentSettingPin
    ){

        const oldPos = state.bindingTrackPos;

        const newDie = diceArray[0];

        state.lastBindingDie = newDie;

        state.bindingTrackPos =
            state.bindingPrevPos +
            newDie;

        if(
            state.bindingTrackPos >=
            BINDING_TRACK.length
        ){
            state.bindingTrackPos =
                BINDING_TRACK.length - 1;
        }

        renderBindingTrack();
        renderDice();
        render();

        if(oldPos !== state.bindingTrackPos){
            state.bindingDashPending = false;
            evaluateBindingTrackPosition();
        }

        return;
    }

    // Pro tension: synchronizuj lastTensionDice → state.dice (evaluateTension čte state.dice)
    if(state.mustCheckTension){
        state.dice = [...diceArray];
        state.lastTensionDice = [...diceArray];
        // Přepočítej a loguj nový součet
        const newTotal = state.dice.reduce((a,b)=>a+b,0);
        addLog(t("logNewSum", newTotal));
        state.tensionLastTotal = newTotal;
    }
    // Pro setting: synchronizuj settingDice a obnov assignment hodnoty
    if(state.currentSettingPin && !state.mustCheckTension){
        // Přepočítej assignment — pokud byla přiřazena kostka která se změnila,
        // aktualizuj hodnotu v state.assignment
        const targets = ['aRow','aCol','bRow','bCol'];
        // state.usedTargets mapuje dieIndex → target
        for(const [dieIdx, target] of Object.entries(state.usedTargets || {})){
            if(diceArray[parseInt(dieIdx)] !== undefined){
                state.assignment[target] = diceArray[parseInt(dieIdx)];
            }
        }
        // Překresli assignment buttony
        if(typeof renderSetting === 'function') renderSetting();
    }
    renderDice();
    render();
}


function applyPowerToDie(index, diceArray){
    if(!state.powerMode) return;

    const mode = state.powerMode;
    state.powerMode = null;

    const isBindingDecision =
    state.currentCheckPin !== null &&
    state.bindingRollCount > 0 &&
    !state.mustCheckTension &&
    !state.currentSettingPin;

    // Odstraň zvýraznění
    const area = document.getElementById("diceArea");
    area.querySelectorAll(".die").forEach(d => {
        d.style.outline = "";
        d.style.cursor = "";
        d.onclick = null;
        if(state.mustCheckTension){
            const i = Array.from(area.querySelectorAll(".die")).indexOf(d);
            d.onclick = () => toggleHold(i);
        } else {
            d.onclick = null;
        }
    });

    if(mode === "reroll"){
        const newVal = rand(6) + 1;
        diceArray[index] = newVal;
        state.powers.reroll = false;
        addLog(t("logRerollUsed", index+1, newVal));
        showToast(t("toastRerolled", index+1, newVal), "success");
    
        if(isBindingDecision){

    addLog(
        `🎲 Binding Reroll: ${state.lastBindingDie} → ${newVal}`
    );

    showToast(
        `🎲 ${state.lastBindingDie} → ${newVal}`,
        "success"
    );
}

        syncDiceAfterPower(diceArray);

    } else if(mode === "modify"){
        const cur = diceArray[index];
        if(cur === 1){
            diceArray[index] = 2;
            state.powers.modify = false;
            addLog(t("logModifyUsed", index+1, 1, 2));
            showToast(t("toastModified", index+1, 2), "success");
            syncDiceAfterPower(diceArray);
        } else if(cur === 6){
            diceArray[index] = 5;
            state.powers.modify = false;
            addLog(t("logModifyUsed", index+1, 6, 5));
            showToast(t("toastModified", index+1, 5), "success");
            syncDiceAfterPower(diceArray);
        } else {
            // Nabídni +1 nebo -1
            showConfirmToast(
                `Kostka ${index+1} = ${cur}`,
                `Zvýšit na ${cur+1} nebo snížit na ${cur-1}?`,
                null
            );
            setTimeout(() => {
                const yes = document.getElementById("confirmYes");
                const no = document.getElementById("confirmNo");
                const dlg = document.getElementById("confirmToast");
                yes.textContent = `+1 → ${cur+1}`;
                yes.onclick = () => {
                    dlg.remove();
                    diceArray[index] = cur + 1;
                    state.powers.modify = false;
                    addLog(t("logModifyUsed", index+1, cur, cur+1));
                    showToast(t("toastModified", index+1, cur+1), "success");
                    syncDiceAfterPower(diceArray);
                };
                no.textContent = `-1 → ${cur-1}`;
                no.onclick = () => {
                    dlg.remove();
                    diceArray[index] = cur - 1;
                    state.powers.modify = false;
                    addLog(t("logModifyUsed", index+1, cur, cur-1));
                    showToast(t("toastModified", index+1, cur-1), "success");
                    syncDiceAfterPower(diceArray);
                };
            }, 50);
        }
    }
}

function assignDie(dieIndex, target){

    if(state.gameOver) return;

    if(!state.usedTargets) state.usedTargets = {};

    // Pokud jsou už všechny 4 targety obsazeny — zamčeno, nelze měnit
    const assignedCount = Object.keys(state.usedTargets).length;
    const allAssigned = assignedCount >= 4;
    if(allAssigned && state.usedTargets[dieIndex] !== target){
        showToast(t("toastAssignmentLocked"), "warning");
        return;
    }

    // Kliknutí na již vybrané tlačítko = odznačení (jen pokud není zamčeno)
    if(state.usedTargets[dieIndex] === target){
        if(allAssigned){
            showToast(t("toastAssignmentLocked"), "warning");
            return;
        }
        delete state.usedTargets[dieIndex];
        state.usedDice = state.usedDice.filter(id => id !== dieIndex);
        state.assignment[target] = null;
        renderSetting();
        renderGrid();
        render();
        return;
    }

    // Pokud tato kostka už byla přiřazena jinam — přeřaď (jen pokud není zamčeno)
    if(state.usedTargets[dieIndex]){
        const oldTarget = state.usedTargets[dieIndex];
        state.assignment[oldTarget] = null;
        delete state.usedTargets[dieIndex];
        state.usedDice = state.usedDice.filter(id => id !== dieIndex);
    }

    // Pokud jiná kostka obsadila tento cíl — uvolni ji
    for(let key in state.usedTargets){
        if(state.usedTargets[key] === target){
            delete state.usedTargets[key];
            state.usedDice = state.usedDice.filter(id => id !== parseInt(key));
        }
    }

    state.usedDice.push(dieIndex);
    state.assignment[target] = state.settingDice[dieIndex];
    state.usedTargets[dieIndex] = target;

    renderSetting();
    renderGrid();
    render();
}

    div.innerHTML = `
        <div style="display: flex; justify-content: space-between;">

        </div>
    `;

    assignDiv.innerHTML = "";

    // 3. Vykreslení kostek a tlačítek s podbarvením
    state.settingDice.forEach((value, index) => {
        const row = document.createElement("div");
        row.style.marginBottom = "8px";

        const targets = [
            { id: 'aRow', label: 'A - R' },
            { id: 'aCol', label: 'A - C' },
            { id: 'bRow', label: 'B - R' },
            { id: 'bCol', label: 'B - C' }
        ];

        let buttonsHtml = "";
        const totalAssigned = Object.keys(state.usedTargets || {}).length;
        const allAssigned = totalAssigned >= 4;

        targets.forEach(tgt => {
            const isSelected = (state.usedTargets && state.usedTargets[index] === tgt.id);
            let style = "";
            let disabled = "";

            if(isSelected){
                if(tgt.id === "aRow" || tgt.id === "aCol"){
                    style = "background-color:#2e7d32;color:#fff;font-weight:bold;";
                } else {
                    style = "background-color:#1565c0;color:#fff;font-weight:bold;";
                }
            }

            // Po zamčení (všechny 4 přiřazeny) — neoznačené buttony jsou disabled
            if(allAssigned && !isSelected){
                disabled = "disabled";
                style += "opacity:0.35;cursor:not-allowed;";
            }

            buttonsHtml += `<button class="assign-btn" style="${style}" ${disabled} onclick="assignDie(${index},'${tgt.id}')">${tgt.label}</button>\n`;
        });

        row.innerHTML = `🎲 ${value} &nbsp; ${buttonsHtml}`;
        assignDiv.appendChild(row);
    });

    renderGrid();
}

                cell => cell.row === r+1 && cell.col === c+1
            );

            // 2. Zjistíme, jestli má na sobě umístěné A nebo B
            const hasA = (a.aRow === r+1 && a.aCol === c+1);
            const hasB = (a.bRow === r+1 && a.bCol === c+1);

            // 3. Rozhodneme o barvě podle priority
            if (hasA && hasB) {
                // Obě kostky jsou zde. Je to zablokované? Pokud ano -> chyba, jinak fialová (nebo jakou máte pro AB)
                cls = isBlockedCell ? "grid-error" : "grid-ab";
            } else if (hasA) {
                // Je tu kostka A. Je to zablokované? Pokud ano -> chyba, jinak zelená
                cls = isBlockedCell ? "grid-error" : "grid-a";
            } else if (hasB) {
                // Je tu kostka B. Je to zablokované? Pokud ano -> chyba, jinak modrá
                cls = isBlockedCell ? "grid-error" : "grid-b";
            } else if (isBlockedCell) {
                // Není tu žádná kostka, ale je to zablokované -> běžná šedá
                cls = "grid-blocked";
            }

            html += `<td class="${cls}">${GRID[r][c]}</td>`;
        }
        html += "</tr>";

// Vrátí true pokud jsou přiřazeny všechny 4 kostky AND žádný průsečík není na blokované buňce
function isReadyToEvaluate(){
    const a = state.assignment;
    if(a.aRow === null || a.aCol === null || a.bRow === null || a.bCol === null)
        return false;
    const blockedA = state.blockedCells.some(cell => cell.row === a.aRow && cell.col === a.aCol);
    const blockedB = state.blockedCells.some(cell => cell.row === a.bRow && cell.col === a.bCol);
    return !blockedA && !blockedB;
}


function calculateIntersections(){

    const a =
        state.assignment;

    if(

        a.aRow===null ||
        a.aCol===null ||
        a.bRow===null ||
        a.bCol===null

    ){

        addLog(
            t("logNotAllAssigned")
        );

        return false;
    }

    const aValue =
        GRID[
            a.aRow-1
        ][
            a.aCol-1
        ];

    const bValue =
        GRID[
            a.bRow-1
        ][
            a.bCol-1
        ];

	state.intersectionA = aValue;
	state.intersectionB = bValue;	

    state.settingTotal =

        aValue +
        bValue +
        state.pickModifier;

    return true;
}


function blockUsedIntersections() {
    // Přidá průsečík A do zablokovaných buněk
    if (state.assignment.aRow !== null && state.assignment.aCol !== null) {
        state.blockedCells.push({ 
            row: state.assignment.aRow, 
            col: state.assignment.aCol 
        });
    }
    
    // Přidá průsečík B do zablokovaných buněk
    if (state.assignment.bRow !== null && state.assignment.bCol !== null) {
        state.blockedCells.push({ 
            row: state.assignment.bRow, 
            col: state.assignment.bCol 
        });
    }
}


function evaluateSetting(){

    if(state.gameOver)
        return;

    // KONTROLA ZABLOKOVANÝCH BUNĚK PŘED VYHODNOCENÍM
    const a = state.assignment;
    const blockedA = state.blockedCells.some(cell => cell.row === a.aRow && cell.col === a.aCol);
    const blockedB = state.blockedCells.some(cell => cell.row === a.bRow && cell.col === a.bCol);
    
    if (blockedA || blockedB) {
        showToast(t("toastBlockedCell"), "error");
        return; // ZDE je return správně, protože zastaví logiku vyhodnocení (nepustí hráče dál)
    }

    if(!calculateIntersections())
        return;

    const pin = state.currentSettingPin;

    if(!pin)
        return;

    addLog(
        t("logAB", state.intersectionA, state.intersectionB)
    );

    addLog(
        t("logTotal", state.settingTotal)
    );

    // =========================
    // ÚSPĚCH
    // =========================

    if(state.settingTotal === pin.height){

        pin.set = true;

        // použité průsečíky jsou trvale vyřazeny
        blockUsedIntersections();

        state.nextBindingOrder++;

        state.assignment = {
            aRow:null,
            aCol:null,
            bRow:null,
            bCol:null
        };

        state.usedDice = [];
        state.usedTargets = {};

        state.settingDice = [];

        state.intersectionA = null;
        state.intersectionB = null;
        state.settingTotal = 0;

        state.currentSettingPin = null;

        addLog(
            t("logPinSet", pin.id)
        );

        showToast(
            t("logPinSet", pin.id),
            "success"
        );

        checkVictory();

        render();
        renderSetting();

        return;
    }

    // =========================
    // OVERSET
    // =========================

    if(state.settingTotal > pin.height){

        oversetPins();

        return;
    }

    // =========================
    // UNDERSET
    // =========================

    addLog(
        t("logTooLow")
    );

    showToast(t("logTooLow"), "warning");

    // použité průsečíky jsou trvale vyřazeny
    blockUsedIntersections();

    state.assignment = {
        aRow:null,
        aCol:null,
        bRow:null,
        bCol:null
    };

    state.usedDice = [];
    state.usedTargets = {};

    state.settingDice = [];

    state.intersectionA = null;
    state.intersectionB = null;
    state.settingTotal = 0;

    state.currentSettingPin = null;

    render();
    renderSetting();
}

function checkVictory(){

    const done =
        state.pins.every(
            p => p.set
        );

    if(!done)
        return;

    state.gameOver = true;

    addLog(
        t("logUnlocked")
    );
    showToast(
    t("toastUnlocked"),
    "success"
);

    calculateScore();
}


function calculateScore(){

    let score = 0;

    let details = [];

    const setPinsCount =
        state.pins.filter(
            p => p.set
        ).length;

    const setPinsScore =
        setPinsCount * 8;

    score += setPinsScore;

    details.push(
        t("scorePins", setPinsCount, setPinsScore)
    );

    const timeRemaining =
        Math.max(
            0,
            30 - state.time
        );

    score += timeRemaining;

    details.push(
        t("scoreTime", timeRemaining)
    );

    const abilities =
        Object.values(state.powers)
        .filter(v => v)
        .length;

    const abilityScore =
        abilities * 5;

    score += abilityScore;

    details.push(
        t("scoreAbilities", abilities, abilityScore)
    );

    const lowPinsCount =
        state.pins.filter(
            p =>
                p.set &&
                (
                    p.height === 2 ||
                    p.height === 3
                )
        ).length;

    const lowPinsScore =
        lowPinsCount * 5;

    score += lowPinsScore;

    details.push(
        t("scoreLowPins", lowPinsCount, lowPinsScore)
    );

    const tensionScore =
        state.tensionPos === 2
        ? 6
        : 0;

    score += tensionScore;

    details.push(
        t("scoreTension", tensionScore)
    );

    const resetScore =
        !state.hasReset
        ? 4
        : 0;

    score += resetScore;

    details.push(
        t("scoreNoReset", resetScore)
    );

    score = Math.min(
        score,
        100
    );

    state.score = score;

    render();

    addLog(
        t("logFinalScore", score) + "\n" + details.join("\n")
    );
}

function moveIntersection(which, dir) {
    if(state.gameOver) return;

    if (!state.currentSettingPin)
        return;

    const moveByTwo = state.pick2Active === true;

    if(moveByTwo){
        // Zdarma — odečteme jeden ze dvou povolených pohybů
        state.pick2MovesRemaining--;
        if(state.pick2MovesRemaining <= 0){
            state.pick2Active = false;
            state.pick2MovesRemaining = 0;
        }
        addLog(t("logPick2Move", state.pick2MovesRemaining));
    } else {
        // Normální posun: stojí tension cost časových kroků
        const cost = getTensionCost();
        if (!spendTime(cost, "M"))
            return;
    }

    // 1. ZMĚNA: Načítáme aktuální souřadnice přímo ze state.assignment
    let row = which === "A" ? state.assignment.aRow : state.assignment.bRow;
    let col = which === "A" ? state.assignment.aCol : state.assignment.bCol;

    // 2. POJISTKA: Pokud ještě nejsou souřadnice přiřazeny (jsou null), nemůžeme s nimi hýbat
    if (row === null || col === null)
        return;

    // 3. JISTOTA: Převod na číslo, aby se zamezilo nechtěným textovým operacím
    row = parseInt(row, 10);
    col = parseInt(col, 10);
    const oldRow = row;
        const oldCol = col;

    // Samotný pohyb
    if (dir === "up") row--;
    if (dir === "down") row++;
    if (dir === "left") col--;
    if (dir === "right") col++;

    // Udržení v mřížce 6x6
    row = Math.max(1, Math.min(6, row));
    col = Math.max(1, Math.min(6, col));

    // Uložení zpět na stejné místo
    if (which === "A") {
        state.assignment.aRow = row;
        state.assignment.aCol = col;
    } else {
        state.assignment.bRow = row;
        state.assignment.bCol = col;
    }

    if(oldRow !== row || oldCol !== col){

        const costText =
            moveByTwo
            ? t("free")
            : t("tensionCostStr", getTensionCost());

        addLog(
            t("logMoveIntersection", which, oldRow, oldCol, row, col, costText)
        );
    }

    renderGrid();
}

function getTensionTrack(total){

    return TENSION_TRACKS.find(
        track =>
            total >= track.min &&
            total <= track.max
    );
}



function evaluateTension(){
    if(state.gameOver) return;

    const total =
        state.dice.reduce(
            (a,b)=>a+b,
            0
        );

    const trackIndex =
        TENSION_TRACKS.findIndex(
            track =>
                total >= track.min &&
                total <= track.max
        );

    if(trackIndex === -1)
        return;

    const pos =
        state.tensionUsed[trackIndex];

    if(pos >= 10){

        addLog(
            t("logTensionRowFull")
        );

        return;
    }

    const effect =
        TENSION_TRACKS[trackIndex]
        .spaces[pos];
		

	addLog(
		t("logTensionSymbol", effect)
	);	

    state.tensionUsed[trackIndex]++;

    applyTensionEffect(effect);
	
	const gaugeValues = [3,2,1,2,3];

addLog(
    t("logTensionPos", gaugeValues[state.tensionPos])
);


    render();
}


function applyTensionEffect(effect){

    switch(effect){

        case "←":
            state.tensionPos--;
            break;

        case "←←":
            state.tensionPos -= 2;
            break;

        case "→":
            state.tensionPos++;
            break;

        case "→→":
            state.tensionPos += 2;
            break;
    }

    if(
        state.tensionPos < 0 ||
        state.tensionPos > 4
    ){
        tensionOutOfRange();
		return;
    }
		renderGauge();
}

    for(let i = 1; i <= 24; i++){
        const sym = BINDING_TRACK[i];
        const isCurrent = (pos === i);
        const isPassed  = (pos > i && pos > 0);

        let symIcon = "";
        let typeClass = "";
        if(sym === "CHECK"){ symIcon = "✓"; typeClass = "bt-check"; }
        else if(sym === "TIME"){ symIcon = "⏱"; typeClass = "bt-time"; }
        else if(sym === "-"){ symIcon = "—"; typeClass = "bt-dash"; }

        const currentClass = isCurrent ? " bt-current" : "";
        const passedClass  = isPassed  ? " bt-passed"  : "";

        html += `<div class="bt-cell${currentClass}${passedClass} ${typeClass}">
            <span class="bt-num">${i}</span>${symIcon}
        </div>`;
    }
    el.innerHTML = html;
}

function render(){
    document.getElementById("timeText")
        .textContent =
        state.time + "";

    document.getElementById("scoreText")
        .textContent =
        state.score;

    document.getElementById("pickText").textContent = state.pickModifier;

    renderPins();
    renderGauge();
	renderTensionTracks();
    renderTimeTrack();
    renderBindingTrack();
    renderDice();


    document
        .querySelectorAll(".control-btn")
        .forEach(btn => {

            btn.disabled =
                state.gameOver;
        });

    const isCheckingBinding = state.currentCheckPin !== null;
    const isDashPending = state.bindingDashPending === true;
    const allBindingsFound = state.bindingFound >= state.difficulty - 1;
    const isSettingPin = state.currentSettingPin !== null;
    const inTension = state.mustCheckTension;

    const assignmentComplete =
    state.assignment.aRow !== null &&
    state.assignment.aCol !== null &&
    state.assignment.bRow !== null &&
    state.assignment.bCol !== null;
    
    const canUseDicePowers =
    (
        state.currentSettingPin &&
        !assignmentComplete
    ) ||
    inTension;    

if(inTension){

    document.querySelectorAll(".control-btn").forEach(btn=>{
        btn.disabled = true;
    });

    document.querySelectorAll(".pick-btn").forEach(btn=>{
        btn.disabled = true;
    });

    document.getElementById("btnTensionRoll").disabled = false;

    if(state.tensionRolls > 0){
        document.getElementById("btnFinishTension").disabled = false;
    }

    updateHints();
    return;
}


    // Uzamknutí a zbarvení binding tlačítek
    const btnCB = document.getElementById("btnCheckBinding");
    const btnBR = document.getElementById("btnBindingRoll");

    btnCB.disabled = state.gameOver || inTension || (isCheckingBinding && !isDashPending) || allBindingsFound;
    btnBR.disabled = state.gameOver || inTension || !isCheckingBinding;

    // Při dashPending: obě tlačítka zelená + aktualizace labelů
    if(isDashPending && !inTension && !state.gameOver){
        btnCB.style.background = "#2e7d32";
        btnCB.style.color = "white";
        btnCB.textContent = t("bindingSkipBtn");
        btnBR.style.background = "#1565c0";
        btnBR.style.color = "white";
        btnBR.textContent = t("bindingRollAgainBtn");
    } else {
        btnCB.style.background = "";
        btnCB.style.color = "";
        btnCB.textContent = t("checkBinding");
        btnBR.style.background = "";
        btnBR.style.color = "";
        btnBR.textContent = t("bindingRoll");
    }
    document.getElementById("btnSetPin").disabled       = state.gameOver || inTension || !allBindingsFound || isSettingPin;
    // btnFinishTension: aktivní až po 1. hodu tension
    document.getElementById("btnFinishTension").disabled = state.gameOver || !inTension || state.tensionRolls < 1;
    // Přehodit a +-1: dostupné jen během nastavování nebo tension, jinak disabled
    document.getElementById("btnPowerReroll").disabled = !state.powers.reroll || state.gameOver || (!state.currentSettingPin && !inTension) ||
    !canUseDicePowers;;
    document.getElementById("btnPowerModify").disabled = !state.powers.modify || state.gameOver || (!state.currentSettingPin && !inTension) ||
    !canUseDicePowers;;

    // Pick 2: aktivní a zelené až když jsou všechny 4 kostky přiřazeny, průsečíky OK, a není tension check
    const btnPick2 = document.getElementById("btnPowerPick2");
    const pick2Available = state.powers.pick2 && !!state.currentSettingPin && !state.gameOver && !state.mustCheckTension && isReadyToEvaluate();
    btnPick2.disabled = !pick2Available;
    btnPick2.style.background = pick2Available ? "#2e7d32" : "";
    btnPick2.style.color = pick2Available ? "white" : "";

    // Pick -1 / 0 / +1: aktivní a zelené až když jsou všechny 4 kostky přiřazeny, průsečíky OK, a není tension check
    const pickReady = !!state.currentSettingPin && !state.gameOver && !inTension && isReadyToEvaluate();
    document.querySelectorAll(".pick-btn").forEach(btn => {
        btn.disabled = !pickReady;
        btn.style.background = pickReady ? "#2e7d32" : "";
        btn.style.color = pickReady ? "white" : "";
    });


    // Přehodit a +-1: aktivní a zelené po Set PIN a není tension check
const rerollBtn = document.getElementById("btnPowerReroll");
    const modifyBtn = document.getElementById("btnPowerModify");

    // Identifikace, že jsme zrovna v pauze po prvním hodu na Binding
    const isBindingDecision = state.currentCheckPin !== null && state.bindingRollCount >= 1;

    // Tlačítka jsou "Ready", pokud hra neskončila a je platný Setting PIN nebo Binding Decision
    const dicePowerReady = (!state.gameOver) && (canUseDicePowers || isBindingDecision);

    // Odemčení / Zamčení tlačítek
    if (rerollBtn) {
        rerollBtn.disabled = !(dicePowerReady && state.powers.reroll);
        rerollBtn.style.background = dicePowerReady && state.powers.reroll ? "#2e7d32" : "";
        rerollBtn.style.color = dicePowerReady && state.powers.reroll ? "white" : "";
    }

    if (modifyBtn) {
        modifyBtn.disabled = !(dicePowerReady && state.powers.modify);
        modifyBtn.style.background = dicePowerReady && state.powers.modify ? "#2e7d32" : "";
        modifyBtn.style.color = dicePowerReady && state.powers.modify ? "white" : "";
    }

    const btnTension = document.getElementById("btnTensionRoll");
    if(btnTension){
        btnTension.disabled = state.gameOver || !inTension;
    }

    // Vyhodnotit: aktivní až když jsou všechny 4 kostky OK, průsečíky nejsou červené, a není tension check
    const btnEvaluate = document.getElementById("btnEvaluate");
    if (btnEvaluate) {
        const ready = !state.gameOver && !inTension && isReadyToEvaluate();
        btnEvaluate.disabled = !ready;
        btnEvaluate.style.background = ready ? "#2e7d32" : "";
        btnEvaluate.style.color = ready ? "white" : "";
        btnEvaluate.style.opacity = ready ? "1" : "0.5";
        btnEvaluate.style.cursor = ready ? "pointer" : "not-allowed";
    }

    // Generický loop — při tension check zakáže vše kromě tension tlačítek
    const managedBtns = ['btnCheckBinding','btnBindingRoll','btnSetPin','btnEvaluate','btnFinishTension',
                         'btnPowerPick2','btnPowerReroll','btnPowerModify','btnTensionRoll'];
    document.querySelectorAll(".control-btn").forEach(btn => {
        if(!managedBtns.includes(btn.id) && !btn.classList.contains("pick-btn")) {
            btn.disabled = state.gameOver || inTension;
        }
    });

    // Confirm New Game tlačítka — nikdy nedisablovat
    document.querySelectorAll("[onclick^='confirmNewGame']").forEach(btn => {
        btn.disabled = false;
    });

    // Pokud je konec hry, zablokujeme pro jistotu i tlačítka u kostek
    if (state.gameOver) {
        document.querySelectorAll(".assign-btn").forEach(btn => btn.disabled = true);
    }

    updateHints();
}





function renderPins(){

    const div =
        document.getElementById("pins");

    div.innerHTML="";

    state.pins.forEach((pin,index)=>{

        const card=document.createElement("div");

        card.className="pin-card";

        if(pin.set)
            card.classList.add("set");

        if(
            state.currentCheckPin === index
        )
            card.classList.add("current");


        card.innerHTML=`

            <div>PIN ${pin.id}</div>

            <br>

            <div>
                ${
                    pin.found
                    ? pin.bindingOrder
                    : "?"
                }
            </div>

        `;

        div.appendChild(card);
    });
}

function renderGauge(){

    const gauge=
        document.getElementById("gauge");

    gauge.innerHTML="";

    const costs=[3,2,1,2,3];

    costs.forEach((cost,index)=>{

        const cell=document.createElement("div");

        cell.className="gauge-cell";

        if(index===state.tensionPos)
            cell.classList.add("gauge-active");

        cell.textContent=cost;

        gauge.appendChild(cell);
    });
}


//Vykreslí TENSION_TRACKS
function renderTensionTracks(){

    const div =
        document.getElementById(
            "tensionTracks"
        );

    div.innerHTML = "";

    TENSION_TRACKS.forEach(
        (track,rowIndex)=>{

            const used =
                state.tensionUsed[rowIndex];

            let html = `
                <div style="
                    margin-bottom:4px;
                    display:flex;
                    align-items:center;
                    gap:2px;
                ">
                <div style="
					width:40px;
					min-width:40px;
					font-size:11px;
					text-align:right;
				">
                    ${track.min}-${track.max}
                </div>
            `;

            track.spaces.forEach(
                (symbol,index)=>{

                    const usedClass =
                        index < used
                        ? "used"
                        : "";

                    html += `
                        <div
                            class="
                                tension-track-cell
                                ${usedClass}
                            ">
                            ${symbol}
                        </div>
                    `;
                }
            );

            html += "</div>";

            div.innerHTML += html;
        }
    );
}


//Vykreslení Time Tracks na časové ose (30 políček)
const TENSION_SLOTS = new Set([
    2,6,10,13,16,19,22,25,27,29
]);

function renderTimeTrack(){

    const div =
        document.getElementById("timeTrack");

    div.innerHTML = "";

    for(let i=0;i<30;i++){

        const pos = i + 1;

        const cell =
            document.createElement("div");

        cell.className = "time-cell";

        if(TENSION_SLOTS.has(pos)){
            cell.classList.add("tension");
        }

        if(i < state.time){
            cell.classList.add("used");
        }

        cell.textContent = pos;

        div.appendChild(cell);
    }
}


function updateHints() {
    // 1. Odebereme zvýraznění ze VŠECH tlačítek
    document.getElementById("btnCheckBinding").classList.remove("btn-next");
    document.getElementById("btnBindingRoll").classList.remove("btn-next");
    document.getElementById("btnSetPin").classList.remove("btn-next");
	document.getElementById("btnFinishTension").classList.remove("btn-next");
 
    const btnTension =
		document.getElementById(
			"btnTensionRoll"
    );

	if(btnTension){

		btnTension.disabled =
			state.gameOver ||
			!state.mustCheckTension;
	}
	
    const btnEvaluate = document.getElementById("btnEvaluate");
    if (btnEvaluate) btnEvaluate.classList.remove("btn-next");

    // PŘIDÁNO: Pokud hra skončila, nebudeme žádná tlačítka obarvovat
		if (state.gameOver) {
			return;
		}

		// TENSION CHECK má absolutní prioritu
	    if(state.mustCheckTension){

        if(state.tensionRolls === 0){

            const tensionBtn =
                document.querySelector(
                    'button[onclick="rollDice()"]'
                );

            if(tensionBtn){
                tensionBtn.classList.add("btn-next");
            }

        }else{

            document
                .getElementById("btnFinishTension")
                .classList.add("btn-next");
        }

        return;
    }


    // Zjištění aktuálních fází hry
    const isCheckingBinding = state.currentCheckPin !== null;
    const allBindingsFound = state.bindingFound >= state.difficulty - 1;
    const isSettingPin = state.currentSettingPin !== null;
    
    // Zjistíme, zda už hráč přiřadil všechny 4 kostky (souřadnice)
    const isReadyToEvaluate = state.usedDice && state.usedDice.length === 4;

    if (isCheckingBinding) {
        // Fáze: Hází se kostkou na binding
        document.getElementById("btnBindingRoll").classList.add("btn-next");
    } else if (!allBindingsFound) {
        // Fáze: Hledá se binding
        document.getElementById("btnCheckBinding").classList.add("btn-next");
    } else {
        // Fáze: Nastavování pinů
        if (isSettingPin) {
            // Kostky jsou hozeny, hráč je přiřazuje.
            // Zelené tlačítko Vyhodnotit se rozsvítí AŽ tehdy, kdy jsou zadány všechny 4.
            if (isReadyToEvaluate && btnEvaluate) {
                btnEvaluate.classList.add("btn-next");
            }
        } else {
            // PIN není vybrán, čekáme na stisk Set PIN (nebo nový pokus)
            document.getElementById("btnSetPin").classList.add("btn-next");
        }
    }
}

        return false;
    }

    showToast(
        "⌛ Hra skončila",

    return true;
}


function saveGame(){

    try{

        localStorage.setItem(
            "lockpick_save",
            JSON.stringify(state)
        );

        addLog(
            "💾 Hra uložena"
        );

        showToast(
            "💾 Hra uložena",
            "success"
        );
    }
    catch(err){

        showToast(
            "❌ Uložení selhalo",
            "error"
        );
    }
}


function loadGame(){

    try{

        const save =
            localStorage.getItem(
                "lockpick_save"
            );

        if(!save){

            showToast(
                "⚠ Nenalezen save",
                "warning"
            );

            return;
        }

        const loaded =
            JSON.parse(save);

        Object.assign(
            state,
            loaded
        );

        // Obnovení reference currentSettingPin
        if(state.currentSettingPin){

            state.currentSettingPin =
                state.pins.find(
                    p =>
                        p.id ===
                        state.currentSettingPin.id
                ) || null;
        }

        render();
        renderSetting();

        if(
            state.gameOver ||
            state.time > 30
        ){

            addLog(
                "⌛ Načtena ukončená hra"
            );

            showToast(
                "⌛ Tato hra již skončila",
                "warning"
            );
        }
        else{

            addLog(
                "📂 Hra načtena"
            );

            showToast(
                "📂 Hra načtena",
                "success"
            );
        }
    }
    catch(err){

        console.error(err);

        showToast(
            "❌ Načtení selhalo",
            "error"
        );
    }
}

}


let toastTimer = null;

function showToast(text, type="info") {
    const toast = document.getElementById("toast");
    toast.className = "";
    
    // ZMĚNA: Použijeme innerHTML a nahradíme konce řádků (\n) za HTML značku <br>
    toast.innerHTML = text.replace(/\n/g, "<br>");

    toast.classList.add(
        type === "success" ? "toast-success" :
        type === "warning" ? "toast-warning" :
        type === "error" ? "toast-error" : "toast-info"
    );

    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
        toast.classList.remove("show");
    }, 4000); // Mírně prodloužíme čas zobrazení, aby hráč stihl přečíst oba piny
}

        helpTitle:          "Lock Pick - Nápověda",    
        helpBody: `
<h3>🎯 Cíl hry</h3>
<p>Byl jsi neprávem uvězněn. Máš 5 minut (30 časových kroků), než se vrátí strážci. Nastav všechny závěrky zámku na správnou výšku a unikni!</p>

<h3>⏱ Časomíra</h3>
<p>Každá akce spotřebuje 1 nebo více časových kroků. Červeně podbarvená políčka spouštějí <b>Tension Check</b>. Pokud potřebuješ označit políčko č. 31 — hra končí prohrou.</p>
<table style="width:100%;font-size:14px;border-collapse:collapse;margin:6px 0;">
<tr><td style="padding:2px 6px;color:#e0a800;"><b>B</b></td><td>Check Binding — testování závěrky</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>X</b></td><td>Časová penalizace (symbol ⏱ na tracku)</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>R</b></td><td>Návrat na nejnižší nenastavenou závěrku</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>S</b></td><td>Set PIN — pokus o nastavení závěrky</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>P</b></td><td>Změna hrotu (2 kroky)</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>M</b></td><td>Posun průsečíku v mřížce</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>O</b></td><td>Overset nebo napětí mimo rozsah</td></tr>
</table>

<h3>🔍 1. Hledání pořadí (Binding)</h3>
<p>Závěrky musíš nastavovat ve správném pořadí. Stiskni <b>Check Binding</b> (1×B), poté <b>Binding Roll</b>. Hodí se 1 kostka a token se posune po Binding Tracku o její hodnotu.</p>
<p>Po každém hodu se vyhodnotí pole, na kterém token skončí:</p>
<ul>
<li><b>✓ CHECK</b> — závěrka nalezena. Odhalí se její výška a můžeš přejít na <b>Set PIN</b>.</li>
<li><b>⏱ TIME</b> — získáš časovou penalizaci (1×X) a pokračuješ k další závěrce.</li>
<li><b>—</b> — můžeš znovu hodit nebo stisknout <b>Další PIN</b> a přejít na další závěrku bez penalizace.</li>
</ul>
<p>Na jednu závěrku můžeš provést maximálně <b>4x Binding Roll</b>. Pokud po čtvrtém hodu skončíš na <b>—</b>, přejdeš automaticky na další závěrku bez penalizace.</p>
<p><b>Poslední nenalezená závěrka</b> se odhalí automaticky.</p>
<p>⚠ Pokud neuspěješ u nejvýše pořadové závěrky, vrátíš se na nejnižší dosud nenastavenou závěrku (1×R).</p>

<h3>⚙ 2. Nastavení napětí (Tension Check)</h3>
<p>Při označení červeně podbarveného políčka musíš <b>před další akcí</b> nastavit napětí. Ostatní tlačítka jsou zamčena.</p>
<p>Stiskni <b>Tension Roll</b> — hodí se 4 kostky. Máš až 3 hody (Yahtzee styl — kliknutím kostku zamkneš). Po 1. hodu se aktivuje <b>Potvrdit napětí</b>. Třetím hodem se potvrdí automaticky.</p>
<p>Součet 4 kostek určí řádek v tabulce. Označí se nejlevější volné políčko — šipka posune ukazatel, <b>X</b> = zůstane.</p>
<p>Ukazatel napětí má 5 pozic s náklady <b>3 — 2 — 1 — 2 — 3</b>. Pokud vypadne mimo rozsah → reset všech závěrek!</p>

<h3>🎯 3. Nastavení závěrky (Set PIN)</h3>
<p>Stiskni <b>Set PIN</b> (1×S). Hodí se 4 kostky. Každou přiřaď:</p>
<ul>
<li><b>A-Row</b> a <b>A-Col</b> — průsečík A v mřížce</li>
<li><b>B-Row</b> a <b>B-Col</b> — průsečík B v mřížce</li>
</ul>
<p>Hodnota A + hodnota B + modifikátor hrotu = výška závěrky?</p>
<ul>
<li>✅ <b>Přesně</b> — závěrka nastavena! Obě buňky se zablokují.</li>
<li>⬇ <b>Příliš nízko</b> — buňky se zablokují, zkus znovu (1×S).</li>
<li>💥 <b>Overset</b> — reset všech závěrek + vymazání mřížky (1×O).</li>
</ul>
<p>⚠ <b>Červená buňka</b> = zablokovaná. Průsečík na červené buňce nelze vyhodnotit — posuň ho!</p>

<h3>↔ 4. Posun průsečíku</h3>
<p>Posuň průsečík A nebo B o 1 pole. Cena = hodnota ukazatele napětí (1–3 kroky M). Nelze na zablokovanou buňku.</p>

<h3>🔧 5. Hrot (Pick)</h3>
<p>Modifikátor k součtu A+B. Tlačítka Pick jsou aktivní (zelená) až po přiřazení všech 4 kostek.</p>
<ul>
<li><b>Pick −1</b> — snižuje součet o 1</li>
<li><b>Pick ±0</b> — bez změny (výchozí)</li>
<li><b>Pick +1</b> — zvyšuje součet o 1</li>
</ul>

<h3>✨ 6. Jednorázové schopnosti</h3>
<p>Každou schopnost lze použít <b>nejvýše jednou za hru</b>. Po použití se tlačítko deaktivuje.</p>
<ul>
<li>
<b>🎲 Přehodit</b> — lze použít během <b>Binding Roll</b>, <b>Tension Roll</b> nebo <b>Další PIN</b>.
Klikni na schopnost a následně na kostku.
Při Bindingu se nejedná o nový hod — původní hodnota kostky se nahradí novou hodnotou a Binding Track se okamžitě přepočítá.
</li>
<li>
<b>➕➖ 1</b> — lze použít během <b>Binding Roll</b>, <b>Tension Roll</b> nebo <b>Další PIN</b>.
Klikni na schopnost a následně na kostku. Hodnota kostky se zvýší nebo sníží o 1 (v rozsahu 1–6).
Při Bindingu se Binding Track okamžitě přepočítá podle nové hodnoty.
</li>
<li>
<b>↔ Pick 2</b> — po přiřazení všech 4 kostek a pokud žádný průsečík neleží na červené buňce.
Získáš 2 bezplatné posuny průsečíků bez časové ztráty.
</li>
</ul>

        helpBody: `
<h3>🎯 Goal</h3>
<p>You have been wrongfully imprisoned. You have 5 minutes (30 time steps) before the guards return. Set all pins to the correct height and escape!</p>

<h3>⏱ Time Tracker</h3>
<p>Each action uses 1 or more time steps. Red-highlighted spaces trigger a <b>Tension Check</b>. If you need to mark space 31 — game over.</p>
<table style="width:100%;font-size:14px;border-collapse:collapse;margin:6px 0;">
<tr><td style="padding:2px 6px;color:#e0a800;"><b>B</b></td><td>Check Binding — testing a pin</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>X</b></td><td>Time penalty (⏱ symbol on track)</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>R</b></td><td>Return to lowest unset pin</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>S</b></td><td>Set PIN — attempt to set a pin</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>P</b></td><td>Change pick (2 steps)</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>M</b></td><td>Move intersection in grid</td></tr>
<tr><td style="padding:2px 6px;color:#e0a800;"><b>O</b></td><td>Overset or tension out of range</td></tr>
</table>

<h3>🔍 1. Finding the Order (Binding)</h3>
<p>Pins must be set in the correct order. Press <b>Check Binding</b> (1×B), then <b>Binding Roll</b>. One die is rolled and the token advances on the Binding Track by that value.</p>
<p>After each roll, the space reached by the token is resolved:</p>
<ul>
<li><b>✓ CHECK</b> — the pin is found. Its height is revealed and you may proceed to <b>Set PIN</b>.</li>
<li><b>⏱ TIME</b> — gain a time penalty (1×X) and move on to the next pin.</li>
<li><b>—</b> — you may roll again or press <b>Next PIN</b> to continue without penalty.</li>
</ul>
<p>You may make up to <b>4 Binding Rolls</b> for a pin. If the fourth roll still lands on <b>—</b>, you automatically move to the next pin without penalty.</p>
<p>The <b>last remaining unfound pin</b> is revealed automatically.</p>
<p>⚠ Failing to find the highest-order pin sends you back to the lowest unset pin (1×R).</p>

<h3>⚙ 2. Tension Check</h3>
<p>Whenever you mark a red time space, you must adjust tension <b>before any other action</b>. All other buttons are locked.</p>
<p>Press <b>Tension Roll</b> — 4 dice are rolled. Up to 3 rolls (Yahtzee style — click a die to hold it). After roll 1, <b>Confirm tension</b> activates. The 3rd roll confirms automatically.</p>
<p>The sum of 4 dice determines the track row. The leftmost unused space is marked — an arrow moves the gauge, <b>X</b> = stays.</p>
<p>The tension gauge has 5 positions with costs <b>3 — 2 — 1 — 2 — 3</b>. If the marker goes out of range → all pins reset!</p>

<h3>🎯 3. Setting a Pin (Set PIN)</h3>
<p>Press <b>Set PIN</b> (1×S). Roll 4 dice. Assign each die:</p>
<ul>
<li><b>A-Row</b> and <b>A-Col</b> — intersection A in the grid</li>
<li><b>B-Row</b> and <b>B-Col</b> — intersection B in the grid</li>
</ul>
<p>Value A + Value B + pick modifier = pin height?</p>
<ul>
<li>✅ <b>Exact</b> — pin set! Both cells are blocked.</li>
<li>⬇ <b>Too low</b> — cells are blocked, try again (1×S).</li>
<li>💥 <b>Overset</b> — all pins reset + grid cleared (1×O).</li>
</ul>
<p>⚠ <b>Red cell</b> = blocked (already used). Cannot evaluate with a red intersection — move it!</p>

<h3>↔ 4. Moving an Intersection</h3>
<p>Move intersection A or B by 1 space. Cost = current tension gauge value (1–3 steps M). Cannot move onto a blocked cell.</p>

<h3>🔧 5. Pick</h3>
<p>Modifier applied to A+B sum. Pick buttons activate (green) only after all 4 dice are assigned.</p>
<ul>
<li><b>Pick −1</b> — reduces sum by 1</li>
<li><b>Pick ±0</b> — no change (default)</li>
<li><b>Pick +1</b> — increases sum by 1</li>
</ul>

<h3>✨ 6. One-Time Powers</h3>
<p>Each power may be used <b>once per game</b>. After use, its button becomes disabled.</p>
<ul>
<li>
<b>🎲 Reroll</b> — may be used during <b>Binding Roll</b>, <b>Tension Roll</b>, or <b>Set PIN</b>.
Click the power, then click a die.
During Binding, this does not count as a new roll — the original die value is replaced and the Binding Track is immediately recalculated.
</li>
<li>
<b>➕➖ 1</b> — may be used during <b>Binding Roll</b>, <b>Tension Roll</b>, or <b>Set PIN</b>.
Click the power, then click a die. The die value is increased or decreased by 1 (within the range 1–6).
During Binding, the Binding Track is immediately recalculated using the new value.
</li>
<li>
<b>↔ Pick 2</b> — after all 4 dice have been assigned and neither intersection is on a red cell.
Gain 2 free intersection moves with no time cost.
</li>
</ul>

<h3>🏆 Scoring</h3>
<table style="width:100%;font-size:14px;border-collapse:collapse;margin:6px 0;">
<tr><td style="padding:3px 6px;">Per pin set</td><td style="text-align:right;color:#e0a800;font-weight:700;">× 8 pts</td></tr>
<tr><td style="padding:3px 6px;">Per remaining time step</td><td style="text-align:right;color:#e0a800;font-weight:700;">× 1 pt</td></tr>
<tr><td style="padding:3px 6px;">Per unused power</td><td style="text-align:right;color:#e0a800;font-weight:700;">× 5 pts</td></tr>
<tr><td style="padding:3px 6px;">Per pin of height 2 or 3</td><td style="text-align:right;color:#e0a800;font-weight:700;">× 5 pts</td></tr>
<tr><td style="padding:3px 6px;">Tension at center at end</td><td style="text-align:right;color:#e0a800;font-weight:700;">6 pts</td></tr>
<tr><td style="padding:3px 6px;">No pin resets</td><td style="text-align:right;color:#e0a800;font-weight:700;">4 pts</td></tr>
<tr style="border-top:1px solid #555;"><td style="padding:3px 6px;font-weight:700;">Maximum</td><td style="text-align:right;color:#e0a800;font-weight:700;">100 pts</td></tr>
</table>`
    }
};

let currentLang = 'en';

function t(key, ...args) {
    const val = TRANSLATIONS[currentLang][key];
    if (typeof val === 'function') return val(...args);
    return val || TRANSLATIONS['cs'][key] || key;
}

function applyTranslations() {
    // Přelož všechny elementy s data-i18n
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = t(key);
        if (val !== undefined) el.textContent = val;
    });

    // Přelož title atributy icon-btn
    const iconBtns = document.querySelectorAll('.icon-btn');
    iconBtns.forEach(btn => {
        if (btn.onclick && btn.onclick.toString().includes('saveGame')) btn.title = t('titleSave');
        if (btn.onclick && btn.onclick.toString().includes('loadGame')) btn.title = t('titleLoad');
        if (btn.onclick && btn.onclick.toString().includes('deleteSave')) btn.title = t('titleDelete');
        if (btn.onclick && btn.onclick.toString().includes('showHelp')) btn.title = t('titleHelp');
    });

    // Přelož lang tlačítko
    const langBtn = document.getElementById('langBtn');
    if (langBtn) {
        langBtn.textContent = t('langFlag');
        langBtn.title = t('langTitle');
    }

    // Přelož nápovědu pokud je otevřená
    const helpTitle = document.querySelector('#helpModal .modal-header h2');
    if (helpTitle) helpTitle.textContent = t('helpTitle');
    const helpBody = document.querySelector('#helpModal .help-body');
    if (helpBody) helpBody.innerHTML = t('helpBody');

    // Přelož settingInfo pokud je neaktivní
    const si = document.getElementById('settingInfo');
    if (si && si.getAttribute('data-i18n') === 'inactive') si.textContent = t('inactive');

    // Přelož html lang atribut
    document.documentElement.lang = currentLang;
}

function toggleLang() {
    currentLang = currentLang === 'cs' ? 'en' : 'cs';
    applyTranslations();
}

// Patch confirmNewGame aby používal přeložené texty
const _origConfirmNewGame = confirmNewGame;
function confirmNewGame(pinCount) {
    if (state.time === 0 && !state.gameOver) { newGame(pinCount); return; }
    showConfirmToast(
        t('confirmNewGameTitle', pinCount),
        t('confirmNewGameMsg'),
        () => newGame(pinCount)
    );
}

// Patch showConfirmToast tlačítek
const _origShowConfirmToast = showConfirmToast;
function showConfirmToast(title, message, onConfirm) {
    const existing = document.getElementById("confirmToast");
    if (existing) existing.remove();
    const el = document.createElement("div");
    el.id = "confirmToast";
    el.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
        background:#2a2a2a;border:2px solid #e0a800;padding:20px 24px;
        z-index:9999;min-width:280px;max-width:360px;text-align:center;
        box-shadow:0 8px 32px rgba(0,0,0,.7);border-radius:4px;`;
    el.innerHTML = `
        <div style="font-size:15px;font-weight:700;color:#e0a800;margin-bottom:8px;">${title}</div>
        <div style="font-size:12px;color:#f44336;margin-bottom:16px;">${message}</div>
        <div style="display:flex;gap:10px;justify-content:center;">
            <button id="confirmYes" style="padding:9px 22px;background:#e0a800;border:none;color:#111;font-weight:700;cursor:pointer;font-size:13px;">${t('confirmYes')}</button>
            <button id="confirmNo"  style="padding:9px 22px;background:#3a3a3a;border:1px solid #555;color:#f0f0f0;cursor:pointer;font-size:13px;">${t('confirmNo')}</button>
        </div>`;
    document.body.appendChild(el);
    if (onConfirm) document.getElementById("confirmYes").onclick = () => { el.remove(); onConfirm(); };
    document.getElementById("confirmNo").onclick = () => el.remove();
}

// Spustit překlad po načtení
document.addEventListener('DOMContentLoaded', applyTranslations);

newGame(4);
</script>
<div id="toast"></div>
